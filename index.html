<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naomi's Games</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="pageShell" class="page-shell">
    <div class="console-frame">
      <div id="screen" class="screen">
        <div id="gameContainer" class="game-container">
          <div id="gameCanvas" class="game-canvas">
            <button id="exitBtn" class="exit-btn" aria-label="Exit app" title="Exit">×</button>
            <div id="screenContent" class="screen-content" role="region" aria-live="polite"></div>
          </div>
        </div>
      </div>

      <button id="btnSun" class="console-btn btn-sun" aria-label="Menu">
        <img src="images/button sun.png" alt="" draggable="false" />
      </button>

      <button id="btnUp" class="console-btn btn-up" aria-label="Up">
        <img src="images/buttonup.png" alt="" draggable="false" />
      </button>

      <button id="btnDown" class="console-btn btn-down" aria-label="Down">
        <img src="images/buttondown.png" alt="" draggable="false" />
      </button>
    </div>

    <footer id="contact" class="footer">
      <p>© 2026 Portfolio Games · Built for GitHub Pages</p>
    </footer>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
